[project]
name = "agent-takkub"
version = "1.0.30"
description = "Desktop cockpit for orchestrating Claude Code dev teammates on Windows"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    # Pinned to the Qt 6.8 LTS series. Qt 6.11.0 shipped a Qt6Core.dll regression
    # that aborts the cockpit with 0xc0000409 (__fastfail) — a hard native crash
    # with no Python traceback, observed recurring in the field (boot.log shows
    # no watchdog stall; Windows WER faults in QtCore). 6.8 is the battle-tested
    # LTS. Pin the Qt6 *binary* packages too (they carry Qt6Core.dll itself), not
    # just the bindings, so a resolver can't pull 6.11 back in. Bump deliberately.
    "PyQt6>=6.8,<6.9",
    "PyQt6-Qt6>=6.8,<6.9",
    "PyQt6-WebEngine>=6.8,<6.9",
    "PyQt6-WebEngine-Qt6>=6.8,<6.9",
    "pywinpty>=2.0;sys_platform=='win32'",
    "ptyprocess>=0.7;sys_platform!='win32'",
    "pyte>=0.8",
    "pyyaml>=6",
    "markdown>=3",
    "psutil>=5.9",
]

[project.scripts]
agent-takkub = "agent_takkub.app:main"
agent-takkub-headless = "agent_takkub.headless:main"
takkub = "agent_takkub.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "ruff>=0.7",
    "pre-commit>=3.7",
    "grimp>=3.14",        # dep-graph generation for tools/gen_import_graph.py
    "import-linter>=2.9", # architecture contracts (lint-imports)
    "build>=1.0",         # wheel builder used by the installed-mode gate tests
]

[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
agent_takkub = [
    "static/*.html",
    "static/*.js",
    "static/*.css",
    "static/*.png",
    "static/fonts/*.ttf",
    "static/fonts/LICENSE.txt",
    "static/fonts/LICENSE-NotoSansThai.txt",
    "static/icons/*.svg",
    # Staged by setup.py's custom build_py from the repo-root CLAUDE.md /
    # .claude/agents/*.md / .claude/skills/*/SKILL.md right before this list
    # is collected — see config.py's ASSETS_ROOT for the
    # installed-vs-dev-checkout read path.
    "_assets/CLAUDE.md",
    "_assets/.claude/agents/*.md",
    "_assets/.claude/skills/*/SKILL.md",
    # remote/ (P0 scaffold) mobile PWA — glob stays empty (no error) until
    # P1 adds files; deleting remote/ makes it empty again, build still works.
    "remote/static/*",
]

# ──────────────────────────────────────────────────────────────────
# ruff: lint + format
# ──────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]
extend-exclude = ["scripts/test_*.py", "scripts/inspect_*.py", "runtime/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = [
    "E501",   # line too long; let `format` handle wrapping
    "B008",   # function call in default arg (PyQt signal defaults are fine)
    "RUF001", # ambiguous unicode chars (we use Thai + diacritics on purpose)
    "RUF002",
    "RUF003",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # asserts in tests are intentional
"src/agent_takkub/orchestrator.py" = ["F401"]  # re-export façade — moved symbols re-exported for tests/app/main_window

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ──────────────────────────────────────────────────────────────────
# pytest
# ──────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

# ──────────────────────────────────────────────────────────────────
# import-linter: architecture guardrails
# ──────────────────────────────────────────────────────────────────
[tool.importlinter]
root_packages = ["agent_takkub"]

[[tool.importlinter.contracts]]
name = "engine-ui-separation"
type = "forbidden"
source_modules = ["agent_takkub.orchestrator"]
forbidden_modules = [
    "agent_takkub.main_window",
    "agent_takkub.app",
]

[[tool.importlinter.contracts]]
name = "cli-ipc-boundary"
type = "forbidden"
# Intent: cli.py drives the running cockpit over the TCP socket (cli_server), it must NOT
# pull the 5.8k-LOC orchestrator engine into the CLI process. _SAFE_PLUGINS was moved to
# config.py (leaf hub) so doctor no longer imports orchestrator, removing the indirect edge.
source_modules = ["agent_takkub.cli"]
forbidden_modules = ["agent_takkub.orchestrator"]

[[tool.importlinter.contracts]]
name = "leaf-modules-pure"
type = "forbidden"
# config/roles/_win_console are pure-leaf (fan-in 18/top-used). List all architectural
# siblings so any future sibling import is caught immediately.
source_modules = [
    "agent_takkub.config",
    "agent_takkub._win_console",
    "agent_takkub.roles",
    "agent_takkub.system_baseline",
]
forbidden_modules = [
