[[tool.importlinter.contracts]]
name = "remote-bolt-on-isolation"
type = "forbidden"
# remote/ (P0 scaffold — remote-control-plan/2026-07-07-remote-control.md) is a
# delete-to-uninstall bolt-on: the rest of the codebase must never structurally
# depend on it. The one core touch point (main_window.py::_boot) reaches it via
# importlib.import_module, which grimp doesn't see as a static edge, so this
# contract stays green with the wiring in place *and* after `rm -rf remote/`.
# source can't be the umbrella `agent_takkub` (remote is its descendant →
# import-linter "shared descendants" error); list the entry points + engine +
# every UI/CLI module that could plausibly wire remote instead.
source_modules = [
    "agent_takkub.app",
    "agent_takkub.main_window",
    "agent_takkub.cli",
    "agent_takkub.cli_server",
    "agent_takkub.orchestrator",
    "agent_takkub.spawn_engine",
    "agent_takkub.agent_pane",
    "agent_takkub.pipeline_executor",
    "agent_takkub.lead_inbox",
    "agent_takkub.update_panel",
    "agent_takkub.project_wizard",
    "agent_takkub.user_actions",
    "agent_takkub.status_header",
    "agent_takkub.doctor",
    "agent_takkub.config",
]
forbidden_modules = ["agent_takkub.remote"]

[[tool.importlinter.contracts]]
name = "settings-management-layer"
type = "forbidden"
# settings_management/ (#103 follow-up — Settings redesign) is a bolt-on
# module tree that adapts existing data-layer modules; it must never pull
# in the engine/UI-chrome/CLI layers it coexists alongside (SPEC.md
# "Coexistence" — legacy settings_window.py and the new module tree share
# storage but never import each other or the orchestrator/app/cli entry
# points). source can't be the umbrella `agent_takkub` (settings_management
# is its descendant -> import-linter "shared descendants" error).
source_modules = ["agent_takkub.settings_management"]
forbidden_modules = [
    "agent_takkub.orchestrator",
    "agent_takkub.app",
    "agent_takkub.cli",
    "agent_takkub.main_window",
    "agent_takkub.settings_window",
]
# Sole sanctioned exception: the standalone dev entry point's "Open legacy
# settings" hook (critic R3 MED — the button was a dead no-op in standalone
# mode without it). Function-level lazy import, one-way convenience glue for
# `python -m agent_takkub.settings_management` only — the window/pages/
# repositories tree itself still never touches legacy.
ignore_imports = [
    "agent_takkub.settings_management.__main__ -> agent_takkub.settings_window",
]

[[tool.importlinter.contracts]]
name = "agent-pane-model-headless"
type = "forbidden"
# agent_pane_model (issue #105 Phase A) is the display-free half of the
# AgentPane split — session/state bookkeeping the orchestrator's watchdogs
# read, importable without QtWidgets/QtWebEngineWidgets/a display so a
# future headless engine (Phase B) can construct it directly. It must never
# import the view (agent_pane, terminal_widget) or UI/CLI/app entry points —
# a leak here would silently reintroduce the display dependency this split
# exists to remove.
source_modules = ["agent_takkub.agent_pane_model"]
forbidden_modules = [
    "agent_takkub.agent_pane",
    "agent_takkub.terminal_widget",
    "agent_takkub.main_window",
    "agent_takkub.app",
    "agent_takkub.cli",
    "agent_takkub.orchestrator",
]

[[tool.importlinter.contracts]]
name = "headless-pane-no-display"
type = "forbidden"
# headless_pane (#105 Phase B) is the QObject-signal adapter that lets
# HeadlessPane sit in the pane registry alongside AgentPane — it wraps
# agent_pane_model.AgentPaneModel but must stay just as display-free: no
# QWidget/QWebEngineView, no orchestrator (headless_window imports THIS
# module, never the other way — importing orchestrator here would cycle).
source_modules = ["agent_takkub.headless_pane"]
forbidden_modules = [
    "agent_takkub.agent_pane",
    "agent_takkub.terminal_widget",
    "agent_takkub.main_window",
    "agent_takkub.app",
    "agent_takkub.cli",
    "agent_takkub.orchestrator",
]

[[tool.importlinter.contracts]]
name = "headless-window-no-display"
type = "forbidden"
# headless_window (#105 Phase B) is MainWindow's display-free counterpart —
# every pane it creates is a HeadlessPane, never a real AgentPane. It must
# never import the desktop entry points directly (main_window, app). NOTE:
# it can't also forbid agent_pane/terminal_widget here — it legitimately
# imports orchestrator, which still imports agent_pane today for one
# isinstance() check (existing architecture, not a Phase B leak); import-
# linter's "forbidden" check is transitive, so that indirect edge would
# always trip. headless_window's real "no display" guarantee is that it
# never *constructs* an AgentPane/QWidget — see its module docstring — which
# is a runtime property, not an import-graph one.
source_modules = ["agent_takkub.headless_window"]
forbidden_modules = [
    "agent_takkub.main_window",
    "agent_takkub.app",
]
