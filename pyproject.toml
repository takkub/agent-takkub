[project]
name = "agent-takkub"
version = "0.1.0"
description = "Desktop cockpit for orchestrating Claude Code dev teammates on Windows"
requires-python = ">=3.11"
dependencies = [
    "PyQt6>=6.6",
    "pywinpty>=2.0;sys_platform=='win32'",
    "pyte>=0.8",
]

[project.scripts]
agent-takkub = "agent_takkub.app:main"
takkub = "agent_takkub.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
