name: codeql

# Static code scanning (GitHub CodeQL). Results appear under the repo's
# Security → Code scanning tab. Python covers the cockpit; javascript-typescript
# covers the npm wrapper (npm/) and the VS Code extension source.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          language: ${{ matrix.language }}
          queries: security-extended

      # Python + JS/TS are interpreted — no build step needed; CodeQL extracts
      # source directly.
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
