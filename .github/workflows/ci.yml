name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    # Cockpit ships on Windows (ConPTY), macOS (_pty_backend) and — since
    # #105 Phase B's headless entrypoint — Linux (ptyprocess + a bare
    # QCoreApplication, no display). All three must stay green. fail-fast:
    # false so one OS failing doesn't cancel the others (we want to see
    # exactly which platform broke).
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      # No display server on the ubuntu runner — PyQt6/PyQt6-WebEngine need
      # these shared libs to even import (offscreen QPA plugin still dlopens
      # WebEngine's Chromium deps). Same list as the headless Docker image's
      # Dockerfile.
      - name: Install Qt runtime libs (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libxkbcommon0 libasound2t64 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxfixes3 libxi6 libxtst6 libdbus-1-3 \
            libglib2.0-0t64 libegl1 fonts-liberation

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Import smoke test (skip Qt modules — no display in CI)
        run: |
          python -c "import agent_takkub.config, agent_takkub.roles, agent_takkub.cli"

      - name: Run tests
        run: python -m pytest -v

  installed-gate:
    # Separate from lint-and-test so a packaging regression (wheel missing
    # CLAUDE.md/role-files/console-script, DATA_HOME/ASSETS_ROOT/CLI_BIN_DIR/
    # pane-env resolving wrong under an installed layout) shows up as its own
    # named check instead of buried in the full suite. tests/test_installed_
    # mode_gate.py never imports agent_takkub in THIS process — every
    # assertion runs via subprocess inside a wheel it builds into a fresh,
    # throwaway venv — so this job only needs pytest + build, no PyQt6/no
    # `pip install -e .`. Keeps it fast (~20-30s) and independent of the
    # heavier lint-and-test install.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test-only deps (no PyQt6, no editable install)
        run: |
          python -m pip install --upgrade pip
          pip install pytest build

      - name: Run installed-mode gate
        run: python -m pytest tests/test_installed_mode_gate.py -v
