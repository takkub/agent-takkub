name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    # Cockpit ships on both Windows (ConPTY) and macOS (_pty_backend) — both
    # must stay green. fail-fast: false so one OS failing doesn't cancel the
    # other (we want to see exactly which platform broke).
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Import smoke test (skip Qt modules — no display in CI)
        run: |
          python -c "import agent_takkub.config, agent_takkub.roles, agent_takkub.cli"

      - name: Run tests
        run: python -m pytest -v
