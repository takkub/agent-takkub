<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>Takkub Remote</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2309090b'/%3E%3Ctext x='32' y='44' font-family='sans-serif' font-size='34' font-weight='700' fill='%2314b8a6' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #09090b;
    --panel: #18181b;
    --line: #3f3f46;
    --fg: #e4e4e7;
    --fg-dim: #a1a1aa;
    --accent: #14b8a6;
    --accent-dim: #0f766e;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior-y: contain;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh;
  }

  /* ---------- offline banner ---------- */
  #offline-banner {
    display: none;
    background: var(--danger);
    color: #fff;
    text-align: center;
    font-size: 0.8rem;
    padding: 6px 8px;
    padding-top: max(6px, env(safe-area-inset-top));
  }
  #offline-banner.show { display: block; }

  /* ---------- header ---------- */
  header {
    padding: 14px 16px 10px;
    padding-top: max(14px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--line);
    flex: none;
  }
  header .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  header h1 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  #header-status {
    flex: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #status-conn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--fg-dim);
  }
  #status-conn .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }
  #status-conn.offline .dot { background: var(--danger); }
  #status-mode {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    border-radius: 999px;
    padding: 2px 9px;
    border: 1px solid var(--line);
    color: var(--fg-dim);
  }
  #status-mode.control {
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  main {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .view { display: none; height: 100%; flex-direction: column; }
  .view.active { display: flex; }

  /* ---------- pairing / fallback screen ---------- */
  #view-pairing {
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    gap: 14px;
  }
  #view-pairing .card {
    width: 100%;
    max-width: 360px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
  }
  #view-pairing h2 { margin: 0 0 6px; font-size: 1.05rem; }
  #view-pairing p { margin: 0 0 14px; color: var(--fg-dim); font-size: 0.85rem; line-height: 1.5; }
  #view-pairing input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--fg);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.9rem;
    margin-bottom: 10px;
  }
  #view-pairing button, .btn {
    width: 100%;
    background: var(--accent);
    color: #04302b;
    border: none;
    border-radius: 8px;
    padding: 11px 12px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  #view-pairing button:active, .btn:active { background: var(--accent-dim); color: #dff8f3; }
  #pairing-error { color: var(--danger); font-size: 0.8rem; min-height: 1.1em; margin-top: 4px; }

  /* ---------- projects ---------- */
  #view-projects { padding: 12px 14px 24px; gap: 8px; }
  .project-row {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.92rem;
  }
  .project-row {
    box-shadow: none;
  }
  .project-row .name-col { display: flex; flex-direction: column; gap: 2px; }
  .project-row .name { font-weight: 500; }
  .project-row .hint {
    font-size: 0.72rem;
    color: var(--fg-dim);
  }
  .project-row .tag {
    font-size: 0.72rem;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    border-radius: 999px;
    padding: 2px 8px;
  }
  .project-row .tag.idle {
    color: var(--fg-dim);
    border-color: var(--line);
  }
  .empty-state {
    color: var(--fg-dim);
    text-align: center;
    padding: 40px 20px;
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* ---------- lead console ---------- */
  #view-lead { flex-direction: column; }
  #lead-log {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 88%;
    padding: 10px 13px;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.lead {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
  }
  .msg.me {
    align-self: flex-end;
    background: var(--accent-dim);
    color: #eafffb;
    border-bottom-right-radius: 4px;
  }
  .msg.sys {
    align-self: center;
    color: var(--fg-dim);
    font-size: 0.76rem;
    background: none;
    max-width: 100%;
    text-align: center;
  }
  #lead-empty {
    margin: auto;
    text-align: center;
    color: var(--fg-dim);
    font-size: 0.85rem;
    line-height: 1.6;
    padding: 24px;
  }
  #lead-empty .icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
  #lead-composer {
    flex: none;
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  #lead-input {
    flex: 1 1 auto;
    resize: none;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--fg);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.9rem;
    max-height: 100px;
    font-family: inherit;
  }
  #lead-input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #lead-send {
    flex: none;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #04302b;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
  }
  #lead-send:disabled { opacity: 0.4; }
  #view-control-note {
    font-size: 0.72rem;
    color: var(--fg-dim);
    text-align: center;
    padding: 4px 12px 8px;
    line-height: 1.5;
  }

  /* ---------- pulse ---------- */
  #view-pulse {
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px;
  }
  #pulse-ring {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0deg, var(--line) 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background 0.4s ease;
  }
  #pulse-ring::before {
    content: "";
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: var(--bg);
  }
  #pulse-numbers {
    position: relative;
    text-align: center;
    z-index: 1;
  }
  #pulse-working {
    font-size: 2.6rem;
    font-weight: 700;
    line-height: 1;
  }
  #pulse-total {
    font-size: 0.85rem;
    color: var(--fg-dim);
    margin-top: 6px;
  }
  #pulse-label {
    color: var(--fg-dim);
    font-size: 0.85rem;
  }
  #pulse-caption {
    color: var(--fg-dim);
    font-size: 0.72rem;
    text-align: center;
    max-width: 260px;
    line-height: 1.5;
    margin-top: -8px;
  }

  /* ---------- bottom nav ---------- */
  nav#bottom-nav {
    flex: none;
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--panel);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav#bottom-nav button {
    flex: 1 1 0;
    background: none;
    border: none;
    color: var(--fg-dim);
    padding: 10px 0 8px;
    font-size: 0.72rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
  }
  nav#bottom-nav button .icon { font-size: 1.2rem; line-height: 1; }
  nav#bottom-nav button.active { color: var(--accent); }
  #app.pairing-mode nav#bottom-nav,
  #app.pairing-mode header { display: none; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 90px;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--fg);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 0.82rem;
    max-width: 85vw;
    text-align: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="offline-banner">cockpit ออฟไลน์ — กำลังลองเชื่อมต่อใหม่</div>

  <header>
    <div class="header-row">
      <h1>Takkub Remote</h1>
      <div id="header-status">
        <span id="status-conn"><span class="dot"></span><span id="status-conn-text">Online</span></span>
        <span id="status-mode">VIEW</span>
      </div>
    </div>
  </header>

  <main>
    <!-- pairing / fallback -->
    <section id="view-pairing" class="view">
      <div class="card">
        <h2>เชื่อมต่อ cockpit</h2>
        <p>สแกน QR จากคอมพิวเตอร์ หรือวางลิงก์จับคู่ (มี <code>#token=</code>) ด้านล่าง</p>
        <input id="pairing-url" type="text" inputmode="url" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="https://.../&lt;secret&gt;/#token=...">
        <button id="pairing-connect">เชื่อมต่อ</button>
        <div id="pairing-error"></div>
      </div>
    </section>

    <!-- projects -->
    <section id="view-projects" class="view">
      <div id="projects-list"></div>
    </section>

    <!-- lead console -->
    <section id="view-lead" class="view">
      <div id="lead-log">
        <div id="lead-empty"><span class="icon">💬</span>ยังไม่มีข้อความ — พิมพ์ถึง Lead ด้านล่างเพื่อเริ่ม</div>
      </div>
      <div id="view-control-note"></div>
      <form id="lead-composer">
        <textarea id="lead-input" rows="1" placeholder="พิมพ์ถึง Lead…"></textarea>
        <button id="lead-send" type="submit">➤</button>
      </form>
    </section>

    <!-- pulse -->
    <section id="view-pulse" class="view">
      <div id="pulse-ring">
        <div id="pulse-numbers">
          <div id="pulse-working">–</div>
          <div id="pulse-total">/ – total</div>
        </div>
      </div>
      <div id="pulse-label">กำลังทำงาน</div>
      <div id="pulse-caption">แสดงจำนวนรวมเท่านั้น — ไม่ระบุรายตัว (privacy by design)</div>
    </section>
  </main>

  <nav id="bottom-nav">
    <button data-view="projects"><span class="icon">📁</span>Projects</button>
    <button data-view="lead"><span class="icon">💬</span>Lead</button>
    <button data-view="pulse"><span class="icon">◎</span>Pulse</button>
  </nav>

  <div id="toast" class="toast"></div>
</div>
<script src="app.js"></script>
</body>
</html>
