<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>agent-takkub terminal</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: #0e0e10;
      overflow: hidden;
    }
    #term {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 4px;
    }
    /* xterm.js viewport scroll bar: subtle dark to match theme */
    .xterm-viewport::-webkit-scrollbar { width: 10px; }
    .xterm-viewport::-webkit-scrollbar-track { background: #18181b; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 5px; }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="xterm-addon-web-links.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div id="term"></div>
  <script>
    // ------------------------------------------------------------------
    // xterm.js terminal setup
    // ------------------------------------------------------------------
    const term = new Terminal({
      fontFamily: '"Cascadia Mono", "Consolas", "Courier New", "Leelawadee UI", "Tahoma", monospace',
      fontSize: 13,
      lineHeight: 1.2,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 2000,
      allowProposedApi: true,
      windowsMode: false,  // we feed bytes already from a Windows pty, no normalisation
      theme: {
        background: '#0e0e10',
        foreground: '#e6e6e6',
        cursor: '#facc15',
        cursorAccent: '#0e0e10',
        selectionBackground: '#3b82f6',
        black: '#1c1c20', red: '#ef4444', green: '#22c55e', yellow: '#facc15',
        blue: '#3b82f6', magenta: '#a855f7', cyan: '#22d3ee', white: '#e6e6e6',
        brightBlack: '#52525b', brightRed: '#f87171', brightGreen: '#4ade80',
        brightYellow: '#fde047', brightBlue: '#60a5fa', brightMagenta: '#c084fc',
        brightCyan: '#67e8f9', brightWhite: '#fafafa',
      },
    });

    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());

    term.open(document.getElementById('term'));
    fit.fit();
    term.focus();

    // ------------------------------------------------------------------
    // Qt bridge — exchange bytes with the Python side over QWebChannel
    // ------------------------------------------------------------------
    let bridge = null;

    // Input policy: pure pass-through. Every keystroke goes straight to
    // the PTY and claude is the *only* writer to the screen. We tried
    // local echo in v0.3.0–0.3.5 to mask claude's redraw latency, but
    // claude's TUI renders arrive out of order under fast input, so a
    // delayed render of "กพ" would overwrite a local erase and the
    // user saw ghost chars stuck on screen.
    //
    // Every native terminal (iTerm, Windows Terminal, wezterm, ...)
    // works this way. claude is slow when busy; the user feels that
    // slowness but the display is *correct* and stays in sync.
    //
    // Kept for future reference: window.termSetIdle exists but is now
    // a no-op so Python-side wiring doesn't need to be ripped out in
    // lock-step.
    window.termSetIdle = function (_idle) { /* no-op since v0.3.6 */ };

    new QWebChannel(qt.webChannelTransport, (channel) => {
      bridge = channel.objects.bridge;

      term.onData((data) => {
        if (bridge && bridge.sendInput) bridge.sendInput(data);
      });

      // resize → tell PTY new cols/rows
      const reportResize = () => {
        if (bridge && bridge.resize) bridge.resize(term.cols, term.rows);
      };
      term.onResize(reportResize);
      reportResize();

      // tell Python we're ready to receive
      if (bridge && bridge.ready) bridge.ready();

      // ------------------------------------------------------------------
      // Level 2: intercept image paste (Ctrl+V / context-menu) before
      // xterm.js handles it. Capture phase runs before xterm's listener.
      // If the clipboard contains an image, encode as base64 and hand off
      // to Python; otherwise let xterm.js process text paste normally.
      // ------------------------------------------------------------------
      document.addEventListener('paste', function(e) {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          if (item.type && item.type.startsWith('image/')) {
            e.stopImmediatePropagation();
            e.preventDefault();
            const file = item.getAsFile();
            const mimeType = item.type;
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              // ev.target.result = "data:image/png;base64,<b64>"
              const b64 = ev.target.result.split(',')[1];
              if (bridge && bridge.pasteImageData) bridge.pasteImageData(b64, mimeType);
            };
            reader.readAsDataURL(file);
            return;  // image wins — don't fall through to xterm text paste
          }
        }
        // No image in clipboard — let xterm.js handle text paste as usual.
      }, true /* capture */);
    });

    // ------------------------------------------------------------------
    // Python → JS API (called via runJavaScript)
    // ------------------------------------------------------------------
    // Output from the PTY arrives as a UTF-8 string. xterm.js's write
    // accepts both strings and Uint8Array; we use the string form for
    // simpler bridging (QWebChannel serialises bytes as base64 otherwise).
    window.termWrite = function (text) {
      term.write(text);
    };

    // Resize the terminal to match the host widget size in cols/rows.
    // We rely on FitAddon to compute cols/rows from the host CSS box.
    window.termFit = function () {
      fit.fit();
    };

    window.termSetFontSize = function (px) {
      term.options.fontSize = px;
      fit.fit();
    };

    window.termClear = function () {
      term.clear();
    };

    // Full reset including scrollback. Called from Python on detach_session
    // so a Lead pane that lives across project switches doesn't accumulate
    // the previous project's transcript in xterm.js memory.
    window.termReset = function () {
      term.reset();
      term.clear();
    };

    // Return the visible screen as plain text (for export / state detection)
    window.termGetBufferText = function () {
      const buf = term.buffer.active;
      const lines = [];
      for (let i = 0; i < buf.length; i++) {
        const line = buf.getLine(i);
        if (line) lines.push(line.translateToString(true));
      }
      return lines.join('\n');
    };

    // Refit whenever the viewport box changes
    new ResizeObserver(() => fit.fit()).observe(document.getElementById('term'));

    // ------------------------------------------------------------------
    // Always-on render loop
    // ------------------------------------------------------------------
    // Chromium (and therefore QtWebEngine) is aggressive about pausing
    // requestAnimationFrame when a view isn't actively the foreground.
    // For a multi-pane cockpit that means non-focused panes display
    // stale frames — PTY output is delivered to xterm.js but the DOM
    // paint never lands until the user clicks/types. We keep a forever
    // RAF loop running so the render service is always ticking. The
    // body is empty; just being scheduled is enough to keep Chrome
    // honest. Cheap even on weak hardware, free on strong ones.
    (function pulse() {
      requestAnimationFrame(pulse);
    })();
  </script>
</body>
</html>
