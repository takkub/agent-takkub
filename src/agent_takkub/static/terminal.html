<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>agent-takkub terminal</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: #0e0e10;
      overflow: hidden;
    }
    #term {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 4px;
    }
    /* input-locked pane: thin amber top border as a passive "read-only" cue.
       Output still renders normally; only manual typing is blocked. */
    body.input-locked #term { box-shadow: inset 0 2px 0 0 #b45309; }
    /* xterm.js viewport scroll bar: subtle dark to match theme */
    .xterm-viewport::-webkit-scrollbar { width: 10px; }
    .xterm-viewport::-webkit-scrollbar-track { background: #18181b; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 5px; }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
  <script src="xterm.js"></script>
  <script src="xterm-addon-fit.js"></script>
  <script src="xterm-addon-web-links.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div id="term"></div>
  <script>
    // ------------------------------------------------------------------
    // xterm.js terminal setup
    // ------------------------------------------------------------------
    const term = new Terminal({
      fontFamily: '"Cascadia Mono", "Consolas", "Courier New", "Leelawadee UI", "Tahoma", monospace',
      fontSize: 13,
      lineHeight: 1.2,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 500,
      allowProposedApi: true,
      windowsMode: false,  // we feed bytes already from a Windows pty, no normalisation
      theme: {
        background: '#0e0e10',
        foreground: '#e6e6e6',
        cursor: '#facc15',
        cursorAccent: '#0e0e10',
        selectionBackground: '#3b82f6',
        black: '#1c1c20', red: '#ef4444', green: '#22c55e', yellow: '#facc15',
        blue: '#3b82f6', magenta: '#a855f7', cyan: '#22d3ee', white: '#e6e6e6',
        brightBlack: '#52525b', brightRed: '#f87171', brightGreen: '#4ade80',
        brightYellow: '#fde047', brightBlue: '#60a5fa', brightMagenta: '#c084fc',
        brightCyan: '#67e8f9', brightWhite: '#fafafa',
      },
    });

    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);

    // Web URLs (http/https/mailto). The addon's default handler calls
    // window.open(), which QtWebEngine silently blocks — links looked dead.
    // Hand the URI to Python (QDesktopServices) so it opens in the real
    // browser. `bridge` is null until QWebChannel connects, but this
    // closure only runs on click, long after that.
    term.loadAddon(new WebLinksAddon.WebLinksAddon((event, uri) => {
      if (bridge && bridge.openUrl) bridge.openUrl(uri);
    }));

    // File paths — xterm's WebLinksAddon only matches URLs, so absolute
    // (C:\... or /...) and project-relative (docs/x.md, src\a\b.py) paths
    // printed by claude/qa/critic were not clickable. Register a custom
    // link provider that linkifies path-looking tokens and hands the click
    // to Python, which resolves it against the pane cwd and opens it with
    // the OS default app (html→browser, md→editor, png→viewer).
    //
    //   group 1: Windows absolute  C:\... or C:/...
    //   group 2: path with a separator ending in a .ext (rel or POSIX-abs)
    const PATH_RE = /[A-Za-z]:[\\/][^\s"'<>|]+|(?:\.{0,2}[\\/])?(?:[\w.@~+-]+[\\/])+[\w.@~+-]+\.[A-Za-z0-9]{1,8}/g;
    term.registerLinkProvider({
      provideLinks(lineNumber, callback) {
        const ln = term.buffer.active.getLine(lineNumber - 1);
        if (!ln) { callback(undefined); return; }
        const text = ln.translateToString(true);
        const links = [];
        let m;
        PATH_RE.lastIndex = 0;
        while ((m = PATH_RE.exec(text)) !== null) {
          let raw = m[0];
          if (/^[a-z][a-z0-9+.-]*:\/\//i.test(raw)) continue;  // a URL — addon owns it
          // drop trailing sentence punctuation from the linkified span
          const tail = raw.match(/[.,;:!?)\]}>'"`]+$/);
          let len = raw.length - (tail ? tail[0].length : 0);
          if (len <= 0) continue;
          raw = raw.slice(0, len);
          const startX = m.index + 1;          // xterm cols are 1-based
          const endX = m.index + len;           // inclusive end col
          links.push({
            text: raw,
            range: { start: { x: startX, y: lineNumber }, end: { x: endX, y: lineNumber } },
            decorations: { pointerCursor: true, underline: true },
            activate(ev, uri) { if (bridge && bridge.openPath) bridge.openPath(uri); },
          });
        }
        callback(links.length ? links : undefined);
      },
    });

    term.open(document.getElementById('term'));
    fit.fit();
    term.focus();

    // ------------------------------------------------------------------
    // Qt bridge — exchange bytes with the Python side over QWebChannel
    // ------------------------------------------------------------------
    let bridge = null;

    // Input policy: pure pass-through. Every keystroke goes straight to
    // the PTY and claude is the *only* writer to the screen. We tried
    // local echo in v0.3.0–0.3.5 to mask claude's redraw latency, but
    // claude's TUI renders arrive out of order under fast input, so a
    // delayed render of "กพ" would overwrite a local erase and the
    // user saw ghost chars stuck on screen.
    //
    // Every native terminal (iTerm, Windows Terminal, wezterm, ...)
    // works this way. claude is slow when busy; the user feels that
    // slowness but the display is *correct* and stays in sync.
    //
    // Kept for future reference: window.termSetIdle exists but is now
    // a no-op so Python-side wiring doesn't need to be ripped out in
    // lock-step.
    window.termSetIdle = function (_idle) { /* no-op since v0.3.6 */ };

    // Input lock: when true, drop every user keystroke in JS before it even
    // crosses the bridge (Python also guards, but stopping it here means no
    // local feedback and no wasted IPC). Mirrored from Python via termSetLocked.
    let inputLocked = false;

    new QWebChannel(qt.webChannelTransport, (channel) => {
      bridge = channel.objects.bridge;

      term.onData((data) => {
        if (inputLocked) return;  // pane is input-locked — swallow keystrokes
        if (bridge && bridge.sendInput) bridge.sendInput(data);
      });

      // resize → tell PTY new cols/rows
      const reportResize = () => {
        if (bridge && bridge.resize) bridge.resize(term.cols, term.rows);
      };
      term.onResize(reportResize);
      reportResize();

      // tell Python we're ready to receive
      if (bridge && bridge.ready) bridge.ready();

      // ------------------------------------------------------------------
      // Level 2: intercept image paste (Ctrl+V / context-menu) before
      // xterm.js handles it. Capture phase runs before xterm's listener.
      // If the clipboard contains an image, encode as base64 and hand off
      // to Python; otherwise let xterm.js process text paste normally.
      // ------------------------------------------------------------------
      document.addEventListener('paste', function(e) {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          if (item.type && item.type.startsWith('image/')) {
            e.stopImmediatePropagation();
            e.preventDefault();
            const file = item.getAsFile();
            const mimeType = item.type;
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              // ev.target.result = "data:image/png;base64,<b64>"
              const b64 = ev.target.result.split(',')[1];
              if (bridge && bridge.pasteImageData) bridge.pasteImageData(b64, mimeType);
            };
            reader.readAsDataURL(file);
            return;  // image wins — don't fall through to xterm text paste
          }
        }
        // No image in clipboard — let xterm.js handle text paste as usual.
      }, true /* capture */);
    });

    // ------------------------------------------------------------------
    // Python → JS API (called via runJavaScript)
    // ------------------------------------------------------------------
    // Output from the PTY arrives as a UTF-8 string. xterm.js's write
    // accepts both strings and Uint8Array; we use the string form for
    // simpler bridging (QWebChannel serialises bytes as base64 otherwise).
    window.termWrite = function (text) {
      term.write(text);
    };

    // Resize the terminal to match the host widget size in cols/rows.
    // We rely on FitAddon to compute cols/rows from the host CSS box.
    window.termFit = function () {
      fit.fit();
    };

    window.termSetFontSize = function (px) {
      term.options.fontSize = px;
      fit.fit();
    };

    // Lock/unlock user input. Also hide the cursor while locked so the pane
    // visibly reads as "you can't type here" (the orchestrator still writes
    // to the PTY, so output keeps flowing — only manual input is blocked).
    window.termSetLocked = function (locked) {
      inputLocked = !!locked;
      try {
        term.options.cursorBlink = !inputLocked;
        term.options.cursorStyle = inputLocked ? 'underline' : 'block';
      } catch (e) {}
      if (document.body) document.body.classList.toggle('input-locked', inputLocked);
    };

    window.termClear = function () {
      term.clear();
    };

    // Full reset including scrollback. Called from Python on detach_session
    // so a Lead pane that lives across project switches doesn't accumulate
    // the previous project's transcript in xterm.js memory.
    window.termReset = function () {
      term.reset();
      term.clear();
    };

    // Return the visible screen as plain text (for export / state detection)
    window.termGetBufferText = function () {
      const buf = term.buffer.active;
      const lines = [];
      for (let i = 0; i < buf.length; i++) {
        const line = buf.getLine(i);
        if (line) lines.push(line.translateToString(true));
      }
      return lines.join('\n');
    };

    // Refit whenever the viewport box changes
    new ResizeObserver(() => fit.fit()).observe(document.getElementById('term'));

    // ------------------------------------------------------------------
    // Throttled keep-alive render loop
    // ------------------------------------------------------------------
    // Chromium (and therefore QtWebEngine) is aggressive about pausing
    // requestAnimationFrame when a view isn't actively the foreground.
    // For a multi-pane cockpit that means non-focused panes display
    // stale frames — PTY output is delivered to xterm.js but the DOM
    // paint never lands until the user clicks/types. We keep the render
    // service ticking so background panes still flush.
    //
    // It used to be a tight 60fps `requestAnimationFrame(pulse)` forever,
    // but that pinned every pane's compositor at full rate continuously —
    // GPU/compositor tiles stayed hot across all panes and never got
    // reclaimed, inflating the shared renderer processes' RAM (a 2-stack
    // session showed renderers at ~2.2 GB each). A ~10fps tick (rAF to
    // land one paint, then a 100 ms gap) keeps background panes flushing
    // within 100 ms — imperceptible for terminal text — while letting
    // Chromium idle the compositor between ticks. Active output still
    // paints promptly: xterm.js schedules its own rAF on every write,
    // independent of this keep-alive. Worst case this is RAM-neutral and
    // still cuts CPU/GPU wakeups ~6x. (See cockpit RAM issue.)
    //
    // 10fps STILL wasn't enough for panes in a HIDDEN project tab: the user
    // can't see them at all, yet the forced pulse kept Chromium compositing
    // them forever and `--disable-backgrounding-occluded-windows` forbade it
    // from reclaiming their tiles, so a backgrounded tab's renderer ballooned
    // to multi-GB. Python now calls termSetKeepalive(false) when this pane's
    // tab loses visibility — the loop self-terminates and the renderer's
    // compositor memory can finally be released. termSetKeepalive(true) on
    // tab re-show forces one repaint (latest buffer surfaces immediately) and
    // restarts the loop. The PTY keeps writing into the xterm.js buffer the
    // whole time; only PAINTING is suspended, so nothing is lost.
    //
    // pulseToken makes rapid hide→show toggles safe: every state change bumps
    // the token, so only the single loop carrying the current token survives
    // and no stale loops accumulate.
    let keepAlive = true;
    let pulseToken = 0;
    function pulse(token) {
      if (token !== pulseToken || !keepAlive) return;  // superseded or suspended
      requestAnimationFrame(() => setTimeout(() => pulse(token), 100));
    }
    pulse(pulseToken);

    window.termSetKeepalive = function (active) {
      active = !!active;
      if (active === keepAlive) return;  // no state change → no extra loop
      keepAlive = active;
      pulseToken++;                      // invalidate any in-flight loop
      if (active) {
        // Resume: force one paint so the buffer that arrived while hidden
        // surfaces at once, then start exactly one fresh loop.
        try { term.refresh(0, term.rows - 1); } catch (e) {}
        pulse(pulseToken);
      }
      // Suspend: token bumped, no new loop → the in-flight loop dies next tick.
    };
  </script>
</body>
</html>
