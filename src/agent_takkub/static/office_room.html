<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dev Team Office</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #06080d; overflow: hidden;
    font-family: 'IBM Plex Sans Thai', -apple-system, BlinkMacSystemFont, sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center;
    z-index: 10;
  }
  #overlay.active { display: flex; }
  #chat-box {
    background: #0f1622;
    border: 1px solid #28384d;
    border-radius: 10px;
    padding: 16px;
    width: 340px;
    color: #dbe4f2;
    font-size: 13px;
    box-shadow: 0 18px 48px -12px rgba(0,0,0,0.8);
  }
  #chat-box h3 { margin-bottom: 8px; color: #8fb6ff; font-size: 14px; }
  #chat-input {
    width: 100%; background: #0a0f18; border: 1px solid #28384d;
    border-radius: 6px; color: #dbe4f2; font-family: inherit;
    font-size: 13px; padding: 7px 9px; margin-top: 8px; outline: none;
    resize: none; height: 72px;
  }
  #chat-input:focus { border-color: #4f7fd0; }
  #chat-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
  #chat-actions button {
    background: #1b2433; border: 1px solid #28384d; border-radius: 6px;
    color: #cdd6e6; padding: 5px 13px; cursor: pointer; font-size: 12px; font-family: inherit;
  }
  #chat-actions button:hover { background: #233146; }
  #chat-actions button.primary { background: #4f7fd0; border-color: #4f7fd0; color: #fff; }
  #chat-actions button.primary:hover { background: #5d8ee0; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Lead click → chat overlay -->
<div id="overlay">
  <div id="chat-box">
    <h3>💬 Lead</h3>
    <div id="chat-tip" style="color:#6f7d93; font-size:11px;">Send a message to Lead or switch to Lead pane.</div>
    <textarea id="chat-input" placeholder="Type a message…"></textarea>
    <div id="chat-actions">
      <button id="btn-cancel">Cancel</button>
      <button id="btn-focus">Switch to Lead pane</button>
      <button id="btn-send" class="primary">Send</button>
    </div>
  </div>
</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script>
"use strict";

// ── role config ──────────────────────────────────────────────────
const ROLE_CFG = {
  lead:      { label: "Lead",    color: "#a78bfa" },
  frontend:  { label: "FE",     color: "#22c55e" },
  backend:   { label: "BE",     color: "#3b82f6" },
  qa:        { label: "QA",     color: "#f59e0b" },
  devops:    { label: "DevOps", color: "#ec4899" },
  gemini:    { label: "Gemini", color: "#4285f4" },
  codex:     { label: "Codex",  color: "#10a37f" },
  reviewer:  { label: "Review", color: "#6366f1" },
  critic:    { label: "Critic", color: "#f97316" },
  mobile:    { label: "Mobile", color: "#06b6d4" },
  designer:  { label: "Design", color: "#d946ef" },
  shell:     { label: "Shell",  color: "#94a3b8" },
};

// Home-desk positions as [x_frac, y_frac] within the room. Desks sit in the
// upper two thirds (back of the room); the pantry + lounge fill the lower
// third. y rises toward the viewer, so higher-y chars render on top.
const DESK_POS = {
  lead:     [0.50, 0.18],
  frontend: [0.14, 0.18],
  backend:  [0.30, 0.18],
  mobile:   [0.70, 0.18],
  designer: [0.86, 0.18],
  qa:       [0.14, 0.40],
  reviewer: [0.30, 0.40],
  gemini:   [0.38, 0.40],
  codex:    [0.62, 0.40],
  devops:   [0.70, 0.40],
  critic:   [0.86, 0.40],
  shell:    [0.50, 0.40],
};

// State indicator dot colors (mirrors the real pane lifecycle). Kept as an
// object with unquoted keys — the structural test greps for "<state>:".
const STATE_DOT = {
  spawn:   "#22c55e",
  busy:    "#facc15",
  idle:    "#22c55e",
  done:    "#ef4444",
  close:   "#3f3f46",
};

// ── ambient speech-bubble pools (idle agents "live") ──────────────
const THOUGHTS = {
  working:  ['โฟกัส ๆ...', 'พิมพ์รัว ๆ', 'อีกนิดเดียวเสร็จ', 'รีวิว PR หน่อย', 'deploy ผ่านแล้ว ✓', 'ไอเดียมาแล้ว!'],
  coffee:   ['พักดื่มกาแฟ', 'หอมจัง~', 'ชาร์จพลังก่อน', 'ขอเบรกแป๊บนึง'],
  chatting: ['เป็นไงบ้างวันนี้?', 'โปรเจกต์ถึงไหนแล้ว?', '555 จริงด้วย', 'เดี๋ยว sync กันนะ', 'bug ตัวนั้นแก้ยัง?'],
  wander:   ['ยืดเส้นยืดสายหน่อย', 'เดินเล่นชิล ๆ', 'พักสมองนิดนึง', 'ไปหยิบของแป๊บ'],
  idle:     ['พักสายตาแป๊บ', 'สบาย ๆ', 'เหม่อมองหน้าต่าง', 'อืม...เงียบดี'],
};
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function rnd(a, b) { return a + Math.random() * (b - a); }

// ── canvas ───────────────────────────────────────────────────────
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");

// `chars` + `hitAreas` are declared up here (not in the character-store
// section below) because the initial resize() iterates `chars`. Declaring
// them later would leave them in the temporal dead zone, so resize() would
// throw before the render loop ever starts → a pitch-black canvas.
const chars = {};     // role → char object
let   hitAreas = [];  // [{role, x, y, r}] updated each frame

function resize() {
  canvas.width  = canvas.offsetWidth  || window.innerWidth;
  canvas.height = canvas.offsetHeight || window.innerHeight;
  // Snap seated (non-walking) chars to their updated desk coords.
  for (const role in chars) {
    const ch = chars[role];
    const [sx, sy] = deskCoords(role);
    ch.seatX = sx; ch.seatY = sy;
    if (ch.visible && ch.act !== "walking" && ch.real !== "close" && ch.real !== "idle") {
      ch.x = sx; ch.y = sy; ch.tx = sx; ch.ty = sy;
    }
  }
}
window.addEventListener("resize", resize);
resize();

// ── world geometry (recomputed from canvas size, so it scales) ────
function baseRole(role) { return role.replace(/#\d+$/, ""); }
function shardIdx(role)  { const m = role.match(/#(\d+)$/); return m ? +m[1] : 0; }

function deskCoords(role) {
  const pos = DESK_POS[baseRole(role)] || [0.50, 0.40];
  const idx = shardIdx(role);
  // Shards spread horizontally around the home desk: #1 → +38, #2 → -38, …
  const ox = idx === 0 ? 0 : (idx % 2 === 1 ? 1 : -1) * Math.ceil(idx / 2) * 38;
  return [canvas.width * pos[0] + ox, canvas.height * pos[1]];
}
function doorCoords()  { return [canvas.width * 0.50, canvas.height * 1.12]; }  // off-screen below door
function pantryRect()  { const W = canvas.width, H = canvas.height; return { x: W * 0.40, y: H * 0.78, w: W * 0.20, h: 46 }; }
function loungePos()   { return { x: canvas.width * 0.50, y: canvas.height * 0.62 }; }
function coffeePoints(){ const W = canvas.width, H = canvas.height; return [{x:W*0.43,y:H*0.74},{x:W*0.50,y:H*0.74},{x:W*0.57,y:H*0.74}]; }
function wanderPoints(){ const W = canvas.width, H = canvas.height;
  return [{x:W*0.30,y:H*0.58},{x:W*0.50,y:H*0.55},{x:W*0.70,y:H*0.60},{x:W*0.40,y:H*0.52},{x:W*0.62,y:H*0.54}]; }
function plantPoints() { const W = canvas.width, H = canvas.height;
  return [{x:W*0.05,y:H*0.10},{x:W*0.95,y:H*0.10},{x:W*0.05,y:H*0.92},{x:W*0.95,y:H*0.92}]; }

function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.max(0, Math.min(255, Math.round(r * f)));
  g = Math.max(0, Math.min(255, Math.round(g * f)));
  b = Math.max(0, Math.min(255, Math.round(b * f)));
  return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ── sprite assets (gen-sprite heroes-pack: knight/mage/archer/rogue) ──
// Each role wears one of four hand-drawn hero sprites. We load an idle frame
// + a 4-frame walk cycle; chars animate the walk while moving and stand idle
// otherwise. Until a PNG loads we fall back to a rectangle avatar so the scene
// never blocks on image I/O.
const ROLE_SPRITE = {
  lead: "mage",   gemini: "mage",   critic: "mage",
  frontend: "knight", devops: "knight", mobile: "knight",
  backend: "archer",  codex: "archer",  designer: "archer",
  qa: "rogue",    reviewer: "rogue",  shell: "rogue",
};
const SPRITE_FRAMES = ["idle", "walk1", "walk2", "walk3", "walk4"];
const SPRITE_W = 58, SPRITE_H = 58;
const sprites = {};

for (const hero of ["knight", "mage", "archer", "rogue"]) {
  sprites[hero] = {};
  for (const f of SPRITE_FRAMES) {
    const img = new Image();
    img.onload = () => { img.ready = true; };
    img.src = `sprites/${hero}/${f}.png`;
    sprites[hero][f] = img;
  }
}
function spriteFor(role) { return sprites[ROLE_SPRITE[baseRole(role)] || "knight"]; }

// ── character store ──────────────────────────────────────────────
function getOrCreate(role) {
  if (chars[role]) return chars[role];
  const cfg = ROLE_CFG[baseRole(role)] || { label: role, color: "#94a3b8" };
  const [doorX, doorY] = doorCoords();
  const [seatX, seatY] = deskCoords(role);
  return chars[role] = {
    role, label: cfg.label, color: cfg.color,
    x: doorX, y: doorY, tx: doorX, ty: doorY,   // position + movement target
    seatX, seatY,
    real: "close",      // real pane lifecycle: spawn|busy|idle|done|close
    act: "idle",        // ambient activity: working|coffee|chatting|wander|idle|walking
    next: "working",    // activity to adopt on arrival
    note: "",
    visible: false,
    facing: "up", flip: false, walkPhase: 0, moving: false,
    idleTimer: 0, talkTimer: rnd(60, 240),
    bubble: null, bubbleTimer: 0,
  };
}

// Map a real pane-state change onto movement + activity.
function setState(role, state, note, project) {
  const ch = getOrCreate(role);
  ch.real = state;
  ch.note = note || "";

  if (state === "close") {
    const [dX, dY] = doorCoords();
    ch.tx = dX; ch.ty = dY; ch.act = "walking"; ch.next = "leave";
    return;
  }

  ch.visible = true;
  if (state === "spawn") {
    const [dX, dY] = doorCoords();   // enter from the door, walk to desk
    ch.x = dX; ch.y = dY;
  }

  if (state === "idle") {
    // Hand control to the ambient AI; it will wander/coffee/chat from here.
    ch.idleTimer = 0;
  } else {
    // spawn / busy / done → sit and work at the home desk.
    const d = Math.hypot(ch.seatX - ch.x, ch.seatY - ch.y);
    if (d < 3) { ch.act = "working"; ch.facing = "up"; ch.idleTimer = rnd(120, 240); }
    else { ch.tx = ch.seatX; ch.ty = ch.seatY; ch.act = "walking"; ch.next = "working"; }
  }
}

// ── ambient AI (only drives chars whose real state is "idle") ─────
function decide(ch) {
  const r = Math.random();
  if (r < 0.40) {            // linger near desk
    ch.tx = ch.seatX + rnd(-18, 18); ch.ty = ch.seatY + rnd(8, 24);
    ch.next = "idle";
  } else if (r < 0.62) {     // coffee run
    const p = pick(coffeePoints()); ch.tx = p.x; ch.ty = p.y; ch.next = "coffee";
  } else if (r < 0.82) {     // wander the floor
    const p = pick(wanderPoints()); ch.tx = p.x; ch.ty = p.y; ch.next = "wander";
  } else {                   // drift to the lounge to chat
    const l = loungePos(); ch.tx = l.x + rnd(-26, 26); ch.ty = l.y + rnd(-12, 12); ch.next = "chatting";
  }
  ch.act = "walking";
}

function popThought(ch) {
  if (ch.act === "walking") return;
  const pool = THOUGHTS[ch.act] || THOUGHTS.idle;
  ch.bubble = (ch.real === "done" && ch.note) ? ch.note : pick(pool);
  ch.bubbleTimer = 170 + (Math.random() * 90 | 0);
}

function arrive(ch) {
  ch.x = ch.tx; ch.y = ch.ty; ch.walkPhase = 0;
  if (ch.real === "close") { ch.visible = false; return; }
  ch.act = ch.next;
  if (ch.act === "working") { ch.facing = "up"; ch.idleTimer = rnd(150, 280); }
  else if (ch.act === "coffee")   { ch.idleTimer = rnd(120, 220); }
  else if (ch.act === "chatting") { ch.idleTimer = rnd(160, 280); }
  else if (ch.act === "wander")   { ch.idleTimer = rnd(70, 150); }
  else                            { ch.idleTimer = rnd(90, 180); }
  ch.talkTimer = Math.min(ch.talkTimer, 20 + Math.random() * 60);
}

// ── update (movement + ambient timers) ───────────────────────────
const SPEED = 2.1;  // px per frame

function update() {
  const toHide = [];
  for (const role in chars) {
    const ch = chars[role];
    if (!ch.visible) continue;

    if (ch.bubbleTimer > 0 && --ch.bubbleTimer <= 0) ch.bubble = null;

    if (ch.act === "walking") {
      const dx = ch.tx - ch.x, dy = ch.ty - ch.y, d = Math.hypot(dx, dy);
      ch.moving = d > 2.4;   // drives the walk-cycle animation in drawChar
      if (d < 2.4) {
        arrive(ch);
        if (ch.real === "close") {
          const [dX, dY] = doorCoords();
          if (Math.hypot(ch.x - dX, ch.y - dY) < 8) toHide.push(role);
        }
      } else {
        const step = Math.min(SPEED, d);
        ch.x += dx / d * step; ch.y += dy / d * step;
        if (Math.abs(dx) > 0.5) ch.flip = dx < 0;
        ch.walkPhase += 0.25;
      }
    } else {
      ch.moving = false;
      if (--ch.talkTimer <= 0) {
        popThought(ch);
        ch.talkTimer = (ch.act === "chatting" ? 140 : 240) + (Math.random() * 200 | 0);
      }
      if (--ch.idleTimer <= 0) {
        if (ch.real === "idle") decide(ch);            // free-roam ambient life
        else ch.idleTimer = rnd(150, 280);             // busy/done: keep working
      }
    }
  }
  for (const r of toHide) delete chars[r];
}

// ── drawing: room ────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawFloor(W, H) {
  ctx.fillStyle = "#0a0e16";
  ctx.fillRect(0, 0, W, H);
  // perspective guide lines toward a vanishing point near the top
  const vx = W / 2, vy = H * 0.10;
  ctx.strokeStyle = "rgba(90,140,170,0.05)"; ctx.lineWidth = 1;
  for (const f of [-0.07, 0.2, 0.4, 0.6, 0.8, 1.07]) {
    ctx.beginPath(); ctx.moveTo(vx, vy); ctx.lineTo(W * f, H); ctx.stroke();
  }
  // horizontal grid bands (eased toward the viewer)
  for (let i = 1; i < 7; i++) {
    const y = vy + (H - vy) * (i / 7) * (i / 7);
    ctx.strokeStyle = "rgba(90,140,170,0.045)";
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // a brighter divider between the desk area and the lounge
  ctx.strokeStyle = "rgba(120,160,190,0.10)";
  ctx.beginPath(); ctx.moveTo(0, H * 0.54); ctx.lineTo(W, H * 0.53); ctx.stroke();

  ctx.fillStyle = "#5a6a82"; ctx.font = "12px 'IBM Plex Mono', monospace";
  ctx.textBaseline = "top"; ctx.textAlign = "left";
  ctx.fillText("🏢  Dev Team Office", 12, 10);
}

function drawPantry() {
  const c = pantryRect();
  ctx.fillStyle = "#0e1722"; rr(c.x, c.y, c.w, c.h, 7); ctx.fill();
  ctx.strokeStyle = "#243a44"; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = "#5a6a82"; ctx.font = "10px 'IBM Plex Mono', monospace"; ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("PANTRY ☕", c.x + c.w / 2, c.y + c.h / 2 + 1);
  // coffee machine on the counter
  ctx.fillStyle = "#16202c"; rr(c.x + 14, c.y + 8, 26, 30, 3); ctx.fill();
  ctx.fillStyle = "#e0857a"; ctx.fillRect(c.x + 32, c.y + 14, 4, 4);
  ctx.fillStyle = "#3fd1c0"; ctx.fillRect(c.x + 32, c.y + 22, 4, 3);
  ctx.textAlign = "left";
}

function drawPlants() {
  for (const p of plantPoints()) {
    ctx.fillStyle = "#101a16"; rr(p.x - 8, p.y + 7, 16, 13, 3); ctx.fill();
    ctx.strokeStyle = "#1c2c24"; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = "#2c4a36"; ctx.beginPath(); ctx.ellipse(p.x, p.y, 11, 13, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#35583f"; ctx.beginPath(); ctx.ellipse(p.x - 3, p.y - 3, 6, 7, 0, 0, 7); ctx.fill();
  }
}

// A desk drawn behind its seated character (the char sits in front, facing up).
function drawDesk(seatX, seatY, color, occupied) {
  const W = 64, H = 30, dx = seatX - W / 2, dy = seatY - 48;
  // chair (behind the char)
  ctx.fillStyle = "#11161f"; rr(seatX - 13, seatY - 9, 26, 17, 5); ctx.fill();
  ctx.strokeStyle = "#1b2433"; ctx.lineWidth = 1; ctx.stroke();
  // desk body
  ctx.fillStyle = "#0e1722"; rr(dx, dy, W, H, 5); ctx.fill();
  ctx.strokeStyle = occupied ? shade(color, 0.7) : "#1e3340"; ctx.lineWidth = 1.5; ctx.stroke();
  // monitor — glows in the role color when the desk is occupied
  ctx.fillStyle = occupied ? "#16323a" : "#0c1a22";
  rr(dx + W / 2 - 16, dy + 6, 32, 17, 3); ctx.fill();
  if (occupied) {
    ctx.fillStyle = color + "66"; rr(dx + W / 2 - 13, dy + 8, 26, 12, 2); ctx.fill();
  }
  ctx.strokeStyle = "#244653"; ctx.lineWidth = 1; rr(dx + W / 2 - 16, dy + 6, 32, 17, 3); ctx.stroke();
  // keyboard hint
  ctx.fillStyle = "#1a2734"; rr(dx + W / 2 - 14, dy + 26, 28, 6, 2); ctx.fill();
}

function drawVignette(W, H) {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.32, W / 2, H / 2, H * 0.85);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, "rgba(0,0,0,0.45)");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

// ── drawing: characters ──────────────────────────────────────────
function drawSelRing(ch) {
  const t = Date.now() / 1000;
  const r = 16 + Math.sin(t * 3) * 2;
  ctx.strokeStyle = "rgba(120,200,230,0.85)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(ch.x, ch.y + 2, r, r * 0.42, 0, 0, 7); ctx.stroke();
}

function drawBubble(x, topY, text) {
  ctx.font = "12px 'IBM Plex Sans Thai', sans-serif";
  const tw = Math.min(ctx.measureText(text).width, 180);
  const pad = 8, bw = tw + pad * 2, bh = 22;
  const bx = x - bw / 2, by = topY - bh - 8;
  ctx.fillStyle = "#0f1622";
  ctx.strokeStyle = "#28384d"; ctx.lineWidth = 1;
  rr(bx, by, bw, bh, 9); ctx.fill(); ctx.stroke();
  // tail
  ctx.beginPath();
  ctx.moveTo(x - 5, by + bh); ctx.lineTo(x + 5, by + bh); ctx.lineTo(x, by + bh + 6);
  ctx.closePath(); ctx.fillStyle = "#0f1622"; ctx.fill();
  ctx.fillStyle = "#dbe4f2"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, x, by + bh / 2, 180);
  ctx.textAlign = "left";
}

function drawChar(ch) {
  if (!ch.visible) return;
  const { x, y, color, label, act } = ch;
  const state = ch.real;   // real pane lifecycle: spawn|busy|idle|done|close

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.beginPath(); ctx.ellipse(x, y + 1, 10, 4, 0, 0, 7); ctx.fill();

  // sprite frame: cycle the 4 walk frames while moving, else stand idle
  const set = spriteFor(ch.role);
  let frame = set ? set.idle : null;
  if (set && ch.moving) frame = set[SPRITE_FRAMES[1 + ((ch.walkPhase | 0) % 4)]];

  let topY;
  if (frame && frame.ready) {
    ctx.imageSmoothingEnabled = false;   // keep the pixel-art crisp
    if (ch.flip) {
      ctx.save(); ctx.translate(x, 0); ctx.scale(-1, 1);
      ctx.drawImage(frame, -SPRITE_W / 2, y - SPRITE_H, SPRITE_W, SPRITE_H);
      ctx.restore();
    } else {
      ctx.drawImage(frame, x - SPRITE_W / 2, y - SPRITE_H, SPRITE_W, SPRITE_H);
    }
    topY = y - SPRITE_H + 6;
  } else {
    // Fallback rectangle avatar until the sprite PNG finishes loading.
    const bH = 16, bW = 12, headR = 6, bX = x - bW / 2, bY = y - bH;
    ctx.fillStyle = color + "aa"; ctx.fillRect(bX, bY, bW, bH);
    ctx.beginPath(); ctx.arc(x, bY - headR, headR, 0, Math.PI * 2);
    ctx.fillStyle = color + "cc"; ctx.fill();
    topY = bY - headR * 2;
  }

  // status dot (real pane state) above the head, with a soft glow
  const dotColor = STATE_DOT[state] || "#94a3b8";
  ctx.globalAlpha = 0.3; ctx.fillStyle = shade(dotColor, 0.6);
  ctx.beginPath(); ctx.arc(x + 11, topY - 4, 5, 0, 7); ctx.fill();
  ctx.globalAlpha = 1; ctx.fillStyle = dotColor;
  ctx.beginPath(); ctx.arc(x + 11, topY - 4, 2.6, 0, 7); ctx.fill();

  // role label
  ctx.fillStyle = color; ctx.font = "bold 9px 'IBM Plex Mono', monospace";
  ctx.textBaseline = "bottom"; ctx.textAlign = "center";
  ctx.fillText(label, x, topY - 2);

  // typing dots while busy
  if (state === "busy" && act === "working") {
    const tick = (Date.now() / 240) % 3 | 0;
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i <= tick ? color : "#2a2a2e";
      ctx.beginPath(); ctx.arc(x - 7 + i * 7, y + 5, 2.4, 0, Math.PI * 2); ctx.fill();
    }
  }

  // pulsing done badge
  if (state === "done") {
    const pulse = Math.sin(Date.now() / 240) * 0.4 + 0.6;
    ctx.beginPath(); ctx.arc(x + 11, topY + 4, 5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(239,68,68,${pulse})`; ctx.fill();
  }

  // speech bubble
  if (ch.bubble && ch.bubbleTimer > 0) drawBubble(x, topY, ch.bubble);

  ctx.textAlign = "left";
}

// ── render loop ──────────────────────────────────────────────────
function render() {
  resize();
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  drawFloor(W, H);
  drawPantry();
  drawPlants();

  hitAreas = [];
  const visible = Object.values(chars).filter(c => c.visible);
  // painter's algorithm: lower y (further back) renders first
  visible.sort((a, b) => a.y - b.y);

  // desks first (behind their occupants), then the characters
  for (const ch of visible) {
    const occupied = ch.act === "working" && Math.hypot(ch.x - ch.seatX, ch.y - ch.seatY) < 6;
    drawDesk(ch.seatX, ch.seatY, ch.color, occupied);
  }
  for (const ch of visible) {
    if (ch.role === selectedRole) drawSelRing(ch);
    drawChar(ch);
    hitAreas.push({ role: ch.role, x: ch.x, y: ch.y - SPRITE_H / 2, r: 26 });
  }

  if (visible.length === 0) {
    ctx.fillStyle = "#3f3f46"; ctx.font = "14px 'IBM Plex Mono', monospace";
    ctx.textBaseline = "middle"; ctx.textAlign = "center";
    ctx.fillText("Waiting for pane events…", W / 2, H / 2);
    ctx.textAlign = "left";
  }

  drawVignette(W, H);
  update();
  requestAnimationFrame(render);
}

// ── click handling ───────────────────────────────────────────────
let selectedRole = null;

canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
  selectedRole = null;
  for (const ha of hitAreas) {
    if (Math.hypot(mx - ha.x, my - ha.y) <= ha.r) {
      selectedRole = ha.role;
      if (baseRole(ha.role) === "lead") openLeadOverlay();
      else if (bridge) bridge.requestFocus(ha.role);
      break;
    }
  }
});

// ── Lead chat overlay ────────────────────────────────────────────
const overlay   = document.getElementById("overlay");
const chatInput = document.getElementById("chat-input");

function openLeadOverlay() { overlay.classList.add("active"); chatInput.value = ""; chatInput.focus(); }
function closeLeadOverlay() { overlay.classList.remove("active"); }

document.getElementById("btn-cancel").addEventListener("click", closeLeadOverlay);
document.getElementById("btn-focus").addEventListener("click", () => {
  closeLeadOverlay();
  if (bridge) bridge.requestFocus("lead");
});
document.getElementById("btn-send").addEventListener("click", () => {
  const msg = chatInput.value.trim();
  closeLeadOverlay();
  chatInput.value = "";
  if (bridge && msg) bridge.sendMessage(msg);
});
chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeLeadOverlay();
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); document.getElementById("btn-send").click(); }
});
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeLeadOverlay(); });

// ── start the render loop FIRST (decoupled from the bridge) ──────
// The scene must paint even if the QWebChannel bridge fails. qwebchannel.js
// loads from a qrc:// resource and qt.webChannelTransport is injected by Qt
// asynchronously — if either isn't ready, `new QWebChannel(...)` throws.
// Starting the loop here guarantees the room renders instead of a black screen.
requestAnimationFrame(render);

// ── QWebChannel wiring (retries until the transport is ready) ────
let bridge = null;

function wireBridge() {
  try {
    if (typeof QWebChannel === "undefined" || !window.qt || !qt.webChannelTransport) {
      setTimeout(wireBridge, 200);
      return;
    }
    new QWebChannel(qt.webChannelTransport, (channel) => {
      bridge = channel.objects.bridge;
      bridge.gameEvent.connect((jsonStr) => {
        try {
          const ev = JSON.parse(jsonStr);
          if (ev.type === "pane_state") {
            setState(ev.role, ev.state, ev.note || "", ev.project || "");
          }
        } catch (_) {}
      });
    });
  } catch (_) {
    setTimeout(wireBridge, 200);
  }
}
wireBridge();
</script>
