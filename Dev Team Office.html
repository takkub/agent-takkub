document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ustify-content:space-between;padding:0 12px;background:#0a0e16;border-bottom:1px solid #18202e;\">\n    <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:#8a97ad;\">\n      <span style=\"width:11px;height:11px;border-radius:3px;background:linear-gradient(135deg,#5b8cff,#a06bff);display:inline-block;\"><\u002Fspan>\n      agent-takkub — dev team cockpit\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:7px;align-items:center;\">\n      <span style=\"width:11px;height:11px;border-radius:50%;background:#2a3548;display:inline-block;\"><\u002Fspan>\n      <span style=\"width:11px;height:11px;border-radius:50%;background:#2a3548;display:inline-block;\"><\u002Fspan>\n      <span style=\"width:11px;height:11px;border-radius:50%;background:#3a2230;display:inline-block;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;display:flex;min-height:0;\">\n\n    <!-- MAIN / OFFICE ROOM -->\n    <main style=\"flex:1;min-width:0;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 50% 0%, #0b1019 0%, #070a11 70%);\">\n      <div style=\"position:relative;width:900px;height:560px;flex:0 0 auto;\">\n        <canvas ref=\"{{ canvasRef }}\" width=\"900\" height=\"560\" onclick=\"{{ onCanvasClick }}\" style=\"display:block;width:100%;height:100%;image-rendering:pixelated;cursor:pointer;\"><\u002Fcanvas>\n        <div ref=\"{{ overlayRef }}\" style=\"position:absolute;inset:0;pointer-events:none;overflow:hidden;\"><\u002Fdiv>\n\n        <!-- room label -->\n        <div style=\"position:absolute;left:12px;top:10px;display:flex;align-items:center;gap:7px;font-family:'Silkscreen',monospace;font-size:11px;color:#5a6a82;letter-spacing:.5px;pointer-events:none;\">\n          <span style=\"font-size:13px;\">▦<\u002Fspan> Office Room\n        <\u002Fdiv>\n\n        <!-- controls -->\n        <div style=\"position:absolute;right:12px;top:10px;display:flex;gap:6px;\">\n          <button class=\"dc-btn\" onclick=\"{{ addEmployee }}\" disabled=\"{{ atCap }}\" style=\"background:{{ addBg }};color:{{ addColor }};border:1px solid #1d2737 !important;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;font-family:'IBM Plex Sans Thai',sans-serif;\">+ พนักงาน<\u002Fbutton>\n          <button class=\"dc-btn\" onclick=\"{{ togglePause }}\" style=\"background:#10141d;color:#9fb0cc;border:1px solid #1d2737 !important;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;\">{{ pauseLabel }}<\u002Fbutton>\n          <button class=\"dc-btn\" onclick=\"{{ cycleSpeed }}\" style=\"background:#10141d;color:#9fb0cc;border:1px solid #1d2737 !important;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;\">{{ speedLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- selected floating panel -->\n        <sc-if value=\"{{ hasSelected }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:absolute;left:12px;bottom:12px;width:268px;background:rgba(10,14,22,.94);backdrop-filter:blur(6px);border:1px solid #1f2a3b;border-radius:13px;padding:13px;box-shadow:0 18px 40px -16px rgba(0,0,0,.7);\">\n            <div style=\"display:flex;gap:11px;align-items:center;\">\n              <div style=\"width:56px;height:56px;border-radius:10px;background:#0c111a;border:1px solid {{ selStateColor }};display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto;box-shadow:0 0 14px -4px {{ selStateColor }};\">\n                <canvas ref=\"{{ avatarRef }}\" width=\"64\" height=\"64\" style=\"width:56px;height:56px;image-rendering:pixelated;\"><\u002Fcanvas>\n              <\u002Fdiv>\n              <div style=\"min-width:0;flex:1;\">\n                <div style=\"display:flex;align-items:center;gap:7px;\">\n                  <span style=\"font-family:'Silkscreen',monospace;font-size:8px;color:{{ selRoleColor }};\">{{ selCode }}<\u002Fspan>\n                  <span style=\"font-size:16px;font-weight:700;color:#e6edf8;\">{{ selName }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#7e8da6;margin-top:1px;\">{{ selRole }}<\u002Fdiv>\n                <div style=\"margin-top:6px;display:inline-flex;align-items:center;gap:6px;background:{{ selStateBg }};color:{{ selStateColor }};border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;\">\n                  <span style=\"width:6px;height:6px;border-radius:50%;background:{{ selStateColor }};\"><\u002Fspan>{{ selStateLabel }}\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:11px;font-size:11.5px;color:#9aa8c0;line-height:1.4;background:#0c111a;border:1px solid #18202e;border-radius:8px;padding:8px 10px;\">{{ selActivity }}<\u002Fdiv>\n\n            <div style=\"margin-top:10px;\">\n              <div style=\"display:flex;justify-content:space-between;font-size:10px;color:#5e6c84;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;\"><span>ENERGY<\u002Fspan><span>{{ selEnergyPct }}%<\u002Fspan><\u002Fdiv>\n              <div style=\"height:6px;border-radius:6px;background:#141b27;overflow:hidden;\">\n                <div style=\"height:100%;width:{{ selEnergyPct }}%;background:{{ selEnergyColor }};border-radius:6px;transition:width .4s ease;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:6px;\">\n              <button class=\"dc-btn\" onclick=\"{{ cmdWork }}\" style=\"background:#12241c;color:#6fe0a0;border:1px solid #1d3a2c !important;border-radius:8px;padding:8px;font-size:12px;font-weight:600;\">ทำงาน<\u002Fbutton>\n              <button class=\"dc-btn\" onclick=\"{{ cmdCoffee }}\" style=\"background:#241d12;color:#e0b66f;border:1px solid #3a2f1d !important;border-radius:8px;padding:8px;font-size:12px;font-weight:600;\">พักกาแฟ<\u002Fbutton>\n              <button class=\"dc-btn\" onclick=\"{{ cmdChat }}\" style=\"background:#121d24;color:#6fb6e0;border:1px solid #1d2f3a !important;border-radius:8px;padding:8px;font-size:12px;font-weight:600;\">ชวนคุย<\u002Fbutton>\n              <button class=\"dc-btn\" onclick=\"{{ cmdWander }}\" style=\"background:#1d1224;color:#b66fe0;border:1px solid #2f1d3a !important;border-radius:8px;padding:8px;font-size:12px;font-weight:600;\">เดินเล่น<\u002Fbutton>\n            <\u002Fdiv>\n            <button class=\"dc-btn\" onclick=\"{{ removeSelected }}\" style=\"margin-top:7px;width:100%;background:transparent;color:#c06f7e;border:1px dashed #3a1d28 !important;border-radius:8px;padding:6px;font-size:11px;font-weight:600;\">ปลดออกจากทีม<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:760},&quot;timeOfDay&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;เช้า&quot;,&quot;กลางคืน&quot;,&quot;เย็น&quot;],&quot;default&quot;:&quot;กลางคืน&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showRoleLabels&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;autoSocial&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.canvasRef = React.createRef();\n    this.overlayRef = React.createRef();\n    this.avatarRef = React.createRef();\n    this.W = 900; this.H = 560; this.S = 2.5;\n    this.selectedId = null;\n    this.paused = false;\n    this.speedMult = 1;\n    this.nextId = 1;\n    this.labels = {}; this.bubbleEls = {};\n    this.fps = 60; this.cpu = 34; this.gpu = 12; this.lat = 24;\n  }\n\n  // ---------- helpers ----------\n  pick(a){ return a[Math.floor(Math.random()*a.length)]; }\n  rnd(a,b){ return a + Math.random()*(b-a); }\n  agent(id){ return this.sim.agents.find(x=>x.id===id); }\n  shade(hex,f){\n    const n=parseInt(hex.slice(1),16);\n    let r=(n>>16)&255,g=(n>>8)&255,b=n&255;\n    r=Math.max(0,Math.min(255,Math.round(r*f)));\n    g=Math.max(0,Math.min(255,Math.round(g*f)));\n    b=Math.max(0,Math.min(255,Math.round(b*f)));\n    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);\n  }\n\n  pools(k){\n    const P={\n      working:['โฟกัส ๆ...','พิมพ์รัว ๆ','อีกนิดเดียวเสร็จ','งานคืบหน้าดีจัง','ขอสมาธิแป๊บ','ไอเดียมาแล้ว!','รีวิว PR หน่อย','deploy ผ่านแล้ว ✓'],\n      coffee:['พักดื่มกาแฟ','หอมจัง~','ชาร์จพลังก่อน','ขอเบรกแป๊บนึง','กาแฟแก้วที่สองแล้ว','สดชื่นขึ้นเยอะ'],\n      chatting:['เป็นไงบ้างวันนี้?','โปรเจกต์ไปถึงไหนแล้ว?','555 จริงด้วย','เห็นด้วยเลย~','เดี๋ยว sync กันนะ','ไอเดียดีมากเลย','bug ตัวนั้นแก้ยัง?'],\n      wander:['ยืดเส้นยืดสายหน่อย','เดินเล่นชิล ๆ','พักสมองนิดนึง','ไปหยิบของแป๊บ'],\n      idle:['พักสายตาแป๊บ','สบาย ๆ','เหม่อมองหน้าต่าง','อืม...เงียบดี']\n    };\n    return P[k]||P.idle;\n  }\n\n  stateMeta(s){\n    const M={\n      working:{label:'กำลังทำงาน',color:'#6fe0a0'},\n      coffee:{label:'พักกาแฟ',color:'#e0b66f'},\n      chatting:{label:'กำลังคุย',color:'#6fb6e0'},\n      walking:{label:'กำลังเดิน',color:'#8a97ad'},\n      wander:{label:'เดินเล่น',color:'#b66fe0'},\n      idle:{label:'พักผ่อน',color:'#7e8da6'}\n    };\n    return M[s]||M.idle;\n  }\n  activityText(a){\n    const T={\n      working:'นั่งโฟกัสกับงานอยู่ที่โต๊ะทำงาน',\n      coffee:'แวะพักดื่มกาแฟที่แพนทรี่เพื่อชาร์จพลัง',\n      chatting:'กำลังพูดคุยแลกเปลี่ยนกับเพื่อนร่วมทีม',\n      walking:'กำลังเดินไปยังจุดหมายถัดไป',\n      wander:'เดินเล่นยืดเส้นยืดสายผ่อนคลายสมอง',\n      idle:'พักผ่อนสบาย ๆ อยู่แถวโต๊ะของตัวเอง'\n    };\n    return T[a.state]||T.idle;\n  }\n\n  // ---------- world ----------\n  setupWorld(){\n    const mk=(x,y)=>({x,y,w:80,h:44,seat:{x:x+40,y:y+62}});\n    this.zones={\n      desks:[ mk(70,86), mk(176,86), mk(70,206), mk(176,206),\n              mk(644,86), mk(750,86), mk(644,206), mk(750,206) ],\n      loungeCenter:{x:450,y:330},\n      coffeePoints:[{x:388,y:498},{x:446,y:498},{x:504,y:498},{x:562,y:498}],\n      counter:{x:356,y:438,w:248,h:46},\n      wanderPoints:[{x:330,y:330},{x:450,y:300},{x:580,y:350},{x:360,y:410},\n                    {x:540,y:300},{x:460,y:200},{x:340,y:170},{x:600,y:420}],\n      plants:[{x:38,y:46},{x:862,y:46},{x:40,y:520},{x:862,y:520}],\n      entry:{x:450,y:556}\n    };\n  }\n\n  freeDesk(){\n    const used=new Array(8).fill(0);\n    for(const a of this.sim.agents) if(a.deskHome!=null) used[a.deskHome]++;\n    let bi=0; for(let i=1;i<8;i++) if(used[i]<used[bi]) bi=i;\n    return bi;\n  }\n\n  buildAgent(name,code,role,roleColor,desk){\n    const skins=['#f1c9a5','#e8b48c','#d39e74','#b07b50','#f3d3b3','#c9966a'];\n    const hairs=['#2b2b2b','#5a3a22','#7a4a25','#b5752e','#3a2d4a','#6b6b6b','#9a3f2e','#caa24a'];\n    const shirts=['#5b86b0','#6f9b5f','#c97b5a','#a07cc0','#5aa1a1','#cf6f6f','#d9a martin','#7a8ad0','#c98fb0'];\n    const pants=['#3a4250','#4a3f36','#3f5066','#42485a'];\n    const pal={\n      skin:this.pick(skins),\n      hair:this.pick(hairs),\n      shirt:this.pick(shirts).replace('d9a martin','#d9a24a'),\n      pants:this.pick(pants),\n      shoe:'#26241f'\n    };\n    const seat=this.zones.desks[desk].seat;\n    return {\n      id:this.nextId++, name, code, role, roleColor, pal,\n      deskHome:desk,\n      x:seat.x, y:seat.y, tx:seat.x, ty:seat.y,\n      state:'working', next:null, sitting:true, facing:'up',\n      timer:this.rnd(2,12), walkPhase:0, speed:62,\n      energy:this.rnd(55,92), forced:false, group:null, groupSpot:null, chatDur:0,\n      talkTimer:this.rnd(2,7), bubble:null, bubbleTimer:0\n    };\n  }\n\n  spawnInitial(){\n    const team=[\n      ['ปอนด์','LEAD','Tech Lead','#7a8ad0'],\n      ['ก้อง','BE','Backend Engineer','#6f9b5f'],\n      ['มิ้นต์','FE','Frontend Engineer','#6fb6e0'],\n      ['ภูมิ','PM','Product Manager','#e0b66f'],\n      ['แพร','UX','UX Designer','#c98fb0'],\n      ['เจมส์','DATA','Data Analyst','#5aa1a1'],\n      ['ปลา','QA','QA Engineer','#cf6f6f'],\n      ['โอ๊ต','OPS','DevOps','#a07cc0']\n    ];\n    this.sim={agents:[]};\n    team.forEach((t,i)=> this.sim.agents.push(this.buildAgent(t[0],t[1],t[2],t[3],i)));\n    this.projects=[\n      {name:'ai-generate-sticker-lin', pct:42, color:'#a06bff', active:true},\n      {name:'agent-takkub', pct:7, color:'#5b8cff', active:false}\n    ];\n  }\n\n  // ---------- lifecycle ----------\n  componentDidMount(){\n    this.setupWorld();\n    this.spawnInitial();\n    this.setupCanvas();\n    this.last=performance.now();\n    this.running=true; this._fc=0; this._ft=this.last; this._pj=this.last;\n    this._loop=this.loop.bind(this);\n    requestAnimationFrame(this._loop);\n    this.refreshTimer=setInterval(()=>{ if(this.running) this.forceUpdate(); }, 480);\n    this.socialTimer=setInterval(()=>this.maybeFormGroup(), 4200);\n  }\n  componentWillUnmount(){\n    this.running=false;\n    clearInterval(this.refreshTimer); clearInterval(this.socialTimer);\n  }\n  setupCanvas(){\n    const c=this.canvasRef.current; if(!c) return;\n    const dpr=Math.min(window.devicePixelRatio||1,2);\n    c.width=this.W*dpr; c.height=this.H*dpr;\n    this.ctx=c.getContext('2d');\n    this.ctx.setTransform(dpr,0,0,dpr,0,0);\n    this.ctx.imageSmoothingEnabled=false;\n  }\n\n  loop(now){\n    if(!this.running) return;\n    let dt=(now-this.last)/1000; this.last=now;\n    if(dt>0.05) dt=0.05;\n    // fps & fake stats\n    this._fc++;\n    if(now-this._ft>=500){\n      this.fps=Math.round(this._fc*1000/(now-this._ft)); this._fc=0; this._ft=now;\n      this.cpu=Math.max(6,Math.min(96,this.cpu+(Math.random()-0.5)*9));\n      this.gpu=Math.max(2,Math.min(80,this.gpu+(Math.random()-0.5)*7));\n      this.lat=Math.max(8,Math.min(120,this.lat+(Math.random()-0.5)*12));\n    }\n    // project progress drift\n    if(now-this._pj>1800){ this._pj=now; const p=this.projects.find(p=>p.active); if(p&&p.pct<100&&Math.random()<0.6) p.pct=Math.min(100,p.pct+1); }\n\n    if(!this.paused) this.update(dt*this.speedMult);\n    if(this.ctx) this.draw();\n    this.updateOverlays();\n    if(this.avatarRef.current && this.selectedId!=null) this.drawAvatar();\n    requestAnimationFrame(this._loop);\n  }\n\n  // ---------- simulation ----------\n  update(dt){\n    for(const a of this.sim.agents){\n      const er={working:-1.5,coffee:6,chatting:0.7,wander:1.3,idle:2.4,walking:-0.3}[a.state]||0;\n      a.energy=Math.max(0,Math.min(100,a.energy+er*dt));\n      if(a.bubbleTimer>0){ a.bubbleTimer-=dt; if(a.bubbleTimer<=0) a.bubble=null; }\n\n      if(a.state==='walking'){\n        const dx=a.tx-a.x, dy=a.ty-a.y, d=Math.hypot(dx,dy);\n        if(d<2.2){ this.arrive(a); }\n        else {\n          const step=Math.min(a.speed*dt, d);\n          a.x+=dx/d*step; a.y+=dy/d*step;\n          a.facing = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up');\n          a.walkPhase += dt*11;\n        }\n      } else {\n        a.timer-=dt;\n        a.talkTimer-=dt;\n        if(a.talkTimer<=0){ this.popThought(a); a.talkTimer=(a.state==='chatting'?2.4:4)+Math.random()*4; }\n        if(a.timer<=0){ if(a.group) a.group=null; this.decide(a); }\n      }\n    }\n  }\n\n  popThought(a){\n    if(a.state==='walking') return;\n    a.bubble=this.pick(this.pools(a.state));\n    a.bubbleTimer=3.0+Math.random()*1.5;\n  }\n\n  arrive(a){\n    a.x=a.tx; a.y=a.ty;\n    const ns=a.next||'idle';\n    a.state=ns; a.forced=false; a.walkPhase=0;\n    if(ns==='working'){ a.sitting=true; a.facing='up'; a.timer=10+Math.random()*10; }\n    else if(ns==='coffee'){ a.sitting=false; a.facing='up'; a.timer=7+Math.random()*6; }\n    else if(ns==='chatting'){\n      a.sitting=false;\n      if(a.groupSpot){ a.facing = a.groupSpot.x<a.x?'left':(a.groupSpot.x>a.x?'right':'up e();\n  }\n  removeSelected(){\n    const id=this.selectedId; if(id==null) return;\n    this.sim.agents=this.sim.agents.filter(a=>a.id!==id);\n    if(this.labels[id]){ this.labels[id].remove(); delete this.labels[id]; }\n    if(this.bubbleEls[id]){ this.bubbleEls[id].el.remove(); delete this.bubbleEls[id]; }\n    this.selectedId=null;\n    this.forceUpdate();\n  }\n  addProject(){\n    const nm=this.pick(['voice-clone-svc','rag-search-api','pixel-sprite-gen','team-sync-bot','vision-ocr-lab']);\n    this.projects.push({name:nm, pct:Math.floor(Math.random()*15), color:this.pick(['#5b8cff','#a06bff','#3fd1c0','#e0857a']), active:false});\n    this.forceUpdate();\n  }\n\n  // ---------- drawing ----------\n  draw(){\n    const ctx=this.ctx;\n    ctx.clearRect(0,0,this.W,this.H);\n    this.drawFloor(ctx);\n    this.drawCounter(ctx);\n    this.drawPlants(ctx);\n    this.drawDesks(ctx);\n    const ags=[...this.sim.agents].sort((a,b)=>a.y-b.y);\n    for(const a of ags){\n      if(a.id===this.selectedId) this.drawSelRing(ctx,a);\n      this.drawChar(ctx,a);\n      this.drawStatus(ctx,a);\n    }\n    this.drawVignette(ctx);\n  }\n\n  drawFloor(ctx){\n    ctx.fillStyle='#0a0e16'; ctx.fillRect(0,0,this.W,this.H);\n    // perspective guide lines from a vanishing point\n    const vx=450, vy=70;\n    ctx.strokeStyle='rgba(90,140,170,0.05)'; ctx.lineWidth=1;\n    for(const bx of [-60,160,360,540,740,960]){\n      ctx.beginPath(); ctx.moveTo(vx,vy); ctx.lineTo(bx,this.H); ctx.stroke();\n    }\n    // horizontal grid bands\n    for(let i=1;i<7;i++){\n      const y=vy + (this.H-vy)*(i/7)*(i/7);\n      ctx.strokeStyle='rgba(90,140,170,0.045)';\n      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(this.W,y); ctx.stroke();\n    }\n    // upper divider line (like screenshot)\n    ctx.strokeStyle='rgba(120,160,190,0.10)';\n    ctx.beginPath(); ctx.moveTo(0,300); ctx.lineTo(this.W,296); ctx.stroke();\n  }\n\n  rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }\n\n  drawDesks(ctx){\n    for(let i=0;i<this.zones.desks.length;i++){\n      const d=this.zones.desks[i];\n      const occ=this.sim.agents.some(a=>a.deskHome===i && a.sitting && Math.hypot(a.x-d.seat.x,a.y-d.seat.y)<6);\n      // chair\n      ctx.fillStyle='#11161f'; this.rr(ctx,d.seat.x-12,d.seat.y-8,24,16,5); ctx.fill();\n      ctx.strokeStyle='#1b2433'; ctx.lineWidth=1; ctx.stroke();\n      // desk body\n      ctx.fillStyle='#0e1722'; this.rr(ctx,d.x,d.y,d.w,d.h,5); ctx.fill();\n      ctx.strokeStyle = occ ? '#2f5f6e' : '#1e3340'; ctx.lineWidth=1.5; ctx.stroke();\n      // monitor\n      ctx.fillStyle = occ ? '#16323a' : '#0c1a22';\n      this.rr(ctx,d.x+d.w/2-15,d.y+7,30,16,3); ctx.fill();\n      if(occ){ ctx.fillStyle='rgba(90,200,220,0.5)'; this.rr(ctx,d.x+d.w/2-12,d.y+9,24,11,2); ctx.fill(); }\n      ctx.strokeStyle='#244653'; ctx.lineWidth=1; this.rr(ctx,d.x+d.w/2-15,d.y+7,30,16,3); ctx.stroke();\n      // keyboard hint\n      ctx.fillStyle='#1a2734'; this.rr(ctx,d.x+d.w/2-13,d.y+27,26,6,2); ctx.fill();\n    }\n  }\n\n  drawCounter(ctx){\n    const c=this.zones.counter;\n    ctx.fillStyle='#0e1722'; this.rr(ctx,c.x,c.y,c.w,c.h,7); ctx.fill();\n    ctx.strokeStyle='#243a44'; ctx.lineWidth=1.5; ctx.stroke();\n    ctx.fillStyle='#5a6a82'; ctx.font=\"9px 'IBM Plex Mono', monospace\"; ctx.textAlign='center';\n    ctx.fillText('PANTRY ☕', c.x+c.w/2, c.y+18);\n    // coffee machine\n    ctx.fillStyle='#16202c'; this.rr(ctx,c.x+12,c.y+8,26,30,3); ctx.fill();\n    ctx.fillStyle='#e0857a'; ctx.fillRect(c.x+30,c.y+14,4,4);\n    ctx.fillStyle='#3fd1c0'; ctx.fillRect(c.x+30,c.y+22,4,3);\n  }\n\n  drawPlants(ctx){\n    for(const p of this.zones.plants){\n      ctx.fillStyle='#101a16'; this.rr(ctx,p.x-7,p.y+6,14,12,3); ctx.fill();\n      ctx.strokeStyle='#1c2c24'; ctx.lineWidth=1; ctx.stroke();\n      ctx.fillStyle='#2c4a36'; ctx.beginPath(); ctx.ellipse(p.x,p.y,10,12,0,0,7); ctx.fill();\n      ctx.fillStyle='#35583f'; ctx.beginPath(); ctx.ellipse(p.x-3,p.y-3,5,6,0,0,7); ctx.fill();\n    }\n  }\n\n  drawSelRing(ctx,a){\n    const t=performance.now()/1000;\n    const r=13+Math.sin(t*3)*1.5;\n    ctx.strokeStyle='rgba(120,200,230,0.85)'; ctx.lineWidth=2;\n    ctx.beginPath(); ctx.ellipse(a.x,a.y+1,r,r*0.42,0,0,7); ctx.stroke();\n    ctx.strokeStyle='rgba(120,200,230,0.25)'; ctx.lineWidth=1;\n    ctx.beginPath(); ctx.ellipse(a.x,a.y+1,r+4,(r+4)*0.42,0,0,7); ctx.stroke();\n  }\n\n  drawStatus(ctx,a){\n    const m=this.stateMeta(a.state);\n    ctx.fillStyle=m.color;\n    ctx.beginPath(); ctx.arc(a.x+10, a.y-42, 2.6, 0, 7); ctx.fill();\n    ctx.fillStyle=this.shade(m.color,0.5);\n    ctx.beginPath(); ctx.arc(a.x+10, a.y-42, 4.5, 0, 7); ctx.globalAlpha=0.3; ctx.fill(); ctx.globalAlpha=1;\n  }\n\n  drawChar(ctx,a){\n    const S=this.S;\n    const ox=Math.round(a.x-6*S), oy=Math.round(a.y-16*S);\n    const px=(gx,gy,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(ox+Math.round(gx*S), oy+Math.round(gy*S), Math.ceil(w*S), Math.ceil(h*S)); };\n    const p=a.pal, f=a.facing, walking=a.state==='walking';\n    // shadow\n    ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.beginPath(); ctx.ellipse(a.x,a.y+1,9,3.6,0,0,7); ctx.fill();\n    // legs\n    if(!a.sitting){\n      const up=walking?(Math.sin(a.walkPhase)>0?1:0):0;\n      const dn=walking?(Math.sin(a.walkPhase)>0?0:1):0;\n      px(4,13+up,2,3,p.pants); px(6,13+dn,2,3,p.pants);\n      px(4,15+up,2,1,p.shoe); px(6,15+dn,2,1,p.shoe);\n    } else {\n      px(3,12,6,2,p.pants);\n    }\n    // body\n    px(3,7,6,5,p.shirt);\n    px(8,7,1,5,this.shade(p.shirt,0.8));\n    px(2,7,1,1,p.shirt); px(9,7,1,1,p.shirt);\n    px(2,8,1,3,p.shirt); px(9,8,1,3,p.shirt);\n    px(2,10,1,1,p.skin); px(9,10,1,1,p.skin);\n    // neck + head\n    px(5,6,2,1,this.shade(p.skin,0.9));\n    px(3,2,6,4,p.skin);\n    // hair\n    if(f==='up'){ px(3,1,6,3,p.hair); px(3,4,6,1,p.hair); }\n    else { px(3,1,6,2,p.hair); px(3,1,1,3,p.hair); px(8,1,1,3,p.hair); }\n    // eyes\n    if(f!=='up'){\n      const eye='#241c1a';\n      if(f==='left'){ px(4,4,1,1,eye); px(6,4,1,1,eye); }\n      else if(f==='right'){ px(5,4,1,1,eye); px(7,4,1,1,eye); }\n      else { px(4,4,1,1,eye); px(7,4,1,1,eye); }\n    }\n  }\n\n  drawAvatar(){\n    const c=this.avatarRef.current; if(!c) return;\n    const a=this.agent(this.selectedId); if(!a) return;\n    if(!this._actx) this._actx=c.getContext('2d');\n    const ctx=this._actx; ctx.imageSmoothingEnabled=false;\n    ctx.clearRect(0,0,64,64);\n    const S=3.4, cx=32, feet=58;\n    const ox=Math.round(cx-6*S), oy=Math.round(feet-16*S);\n    const px=(gx,gy,w,h,col)=>{ ctx.fillStyle=col; ctx.fillRect(ox+Math.round(gx*S), oy+Math.round(gy*S), Math.ceil(w*S), Math.ceil(h*S)); };\n    const p=a.pal;\n    px(4,13,2,3,p.pants); px(6,13,2,3,p.pants); px(4,15,2,1,p.shoe); px(6,15,2,1,p.shoe);\n    px(3,7,6,5,p.shirt); px(8,7,1,5,this.shade(p.shirt,0.8));\n    px(2,7,1,1,p.shirt); px(9,7,1,1,p.shirt); px(2,8,1,3,p.shirt); px(9,8,1,3,p.shirt);\n    px(2,10,1,1,p.skin); px(9,10,1,1,p.skin);\n    px(5,6,2,1,this.shade(p.skin,0.9)); px(3,2,6,4,p.skin);\n    px(3,1,6,2,p.hair); px(3,1,1,3,p.hair); px(8,1,1,3,p.hair);\n    px(4,4,1,1,'#241c1a'); px(7,4,1,1,'#241c1a');\n  }\n\n  drawVignette(ctx){\n    const g=ctx.createRadialGradient(this.W/2,this.H/2,this.H*0.32,this.W/2,this.H/2,this.H*0.85);\n    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.45)');\n    ctx.fillStyle=g; ctx.fillRect(0,0,this.W,this.H);\n    const tod=(this.props&&this.props.timeOfDay)||'กลางคืน';\n    if(tod==='เย็น'){ ctx.fillStyle='rgba(224,133,90,0.07)'; ctx.fillRect(0,0,this.W,this.H); }\n    else if(tod==='เช้า'){ ctx.fillStyle='rgba(120,170,210,0.05)'; ctx.fillRect(0,0,this.W,this.H); }\n  }\n\n  // ---------- overlays ----------\n  updateOverlays(){\n    const ov=this.overlayRef.current; if(!ov) return;\n    const showLabels = !(this.props && this.props.showRoleLabels===false);\n    const seen=new Set();\n    for(const a of this.sim.agents){\n      seen.add(a.id);\n      // role label\n      let ln=this.labels[a.id];\n      if(!ln){\n        ln=document.createElement('div');\n        ln.style.cssText=\"position:absolute;transform:translate(-50%,0);font-family:'Silkscreen',monospace;font-size:8px;white-space:nowrap;pointer-events:none;letter-spacing:.3px;\";\n        ov.appendChild(ln); this.labels[a.id]=ln;\n      }\n      ln.textContent=a.code;\n      ln.style.display = showLabels ? 'block':'none';\n      ln.style.left=a.x+'px';\n      ln.style.top=(a.y-16*this.S-13)+'px';\n      const sel=a.id===this.selectedId;\n      ln.style.color=a.roleColor;\n      ln.style.opacity = sel?'1':'0.75';\n      ln.style.textShadow = sel ? '0 0 8px '+a.roleColor+', 0 1px 2px #000' : '0 1px 2px #000';\n      // bubble\n      let b=this.bubbleEls[a.id];\n      if(a.bubble && a.bubbleTimer>0){\n        if(!b){\n          const el=document.createElement('div');\n          el.style.cssText=\"position:absolute;transform:translate(-50%,-100%);max-width:160px;background:#0f1622;color:#dbe4f2;border:1px solid #28384d;border-radius:9px;padding:5px 9px;font:500 11.5px 'IBM Plex Sans Thai',sans-serif;line-height:1.3;text-align:center;pointer-events:none;box-shadow:0 6px 16px -6px rgba(0,0,0,.7);\";\n          const tail=document.createElement('div');\n          tail.style.cssText=\"position:absolute;left:50%;bottom:-4px;width:7px;height:7px;background:#0f1622;border-right:1px solid #28384d;border-bottom:1px solid #28384d;transform:translateX(-50%) rotate(45deg);\";\n          el.appendChild(tail);\n          const sp=document.createElement('span'); el.appendChild(sp);\n          ov.appendChild(el);\n          b={el,sp}; this.bubbleEls[a.id]=b;\n        }\n        if(b.sp.textContent!==a.bubble){\n          b.sp.textContent=a.bubble;\n          b.el.style.animation='none'; void b.el.offsetWidth; b.el.style.animation='bubblePop .18s ease-out';\n        }\n        b.el.style.display='block';\n        b.el.style.left=a.x+'px';\n        b.el.style.top=(a.y-16*this.S-24)+'px';\n      } else if(b){ b.el.style.display='none'; }\n    }\n    for(const id in this.labels){\n      if(!seen.has(+id)){\n        this.labels[id].remove(); delete this.labels[id];\n        if(this.bubbleEls[id]){ this.bubbleEls[id].el.remove(); delete this.bubbleEls[id]; }\n      }\n    }\n  }\n\n  // ---------- render ----------\n  renderVals(){\n    const agents=this.sim?this.sim.agents:[];\n    const sel=this.selectedId!=null ? agents.find(a=>a.id===this.selectedId) : null;\n    const energyColor=(e)=> e<25?'#cf6f6f':(e<55?'#e0b66f':'#6fe0a0');\n\n    const agentList=agents.map(a=>{\n      const m=this.stateMeta(a.state);\n      const isSel=a.id===this.selectedId;\n      return {\n        id:a.id, name:a.name, code:a.code, role:a.role, roleColor:a.roleColor,\n        dot:a.pal.shirt, stateLabel:m.label, stateColor:m.color,\n        rowBg: isSel?'#16202e':'transparent',\n        onSelect:()=>this.select(a.id)\n      };\n    });\n\n    const projectList=(this.projects||[]).map(p=>({\n      name:p.name, pct:Math.round(p.pct), dot:p.color,\n      name_color: p.active?'#cdd6e6':'#8a97ad',\n      bg: p.active?'#121a28':'transparent',\n      border: p.active?'#26344a':'transparent'\n    }));\n\n    let selVals={};\n    if(sel){\n      const m=this.stateMeta(sel.state);\n      selVals={\n        hasSelected:true, noSelection:false,\n        selName:sel.name, selCode:sel.code, selRole:sel.role, selRoleColor:sel.roleColor,\n        selStateLabel:m.label, selStateColor:m.color, selStateBg:this.shade(m.color,0.18)+'',\n        selActivity:this.activityText(sel),\n        selEnergyPct:Math.round(sel.energy), selEnergyColor:energyColor(sel.energy)\n      };\n      // hex+alpha bg approximate: build rgba\n      const hx=m.color; selVals.selStateBg='rgba('+parseInt(hx.slice(1,3),16)+','+parseInt(hx.slice(3,5),16)+','+parseInt(hx.slice(5,7),16)+',0.15)';\n    } else {\n      selVals={ hasSelected:false, noSelection:true };\n    }\n\n    const cnt=agents.length;\n    const atCap=cnt>=14;\n\n    return {\n      canvasRef:this.canvasRef, overlayRef:this.overlayRef, avatarRef:this.avatarRef,\n      onCanvasClick:(e)=>this.onCanvasClick(e),\n      agentList, projectList, count:cnt, atCap,\n      addBg: atCap?'#141a26':'#16202e', addColor: atCap?'#3a4456':'#9fb0cc',\n      togglePause:()=>this.togglePause(), cycleSpeed:()=>this.cycleSpeed(),\n      pauseLabel: this.paused?'▶':'⏸',\n      speedLabel: this.speedMult+'×',\n      cmdWork:()=>this.command('work'), cmdCoffee:()=>this.command('coffee'),\n      cmdChat:()=>this.command('chat'), cmdWander:()=>this.command('wander'),\n      removeSelected:()=>this.removeSelected(), addEmployee:()=>this.addEmployee(), addProject:()=>this.addProject(),\n      statFps:Math.round(this.fps), statGpu:Math.round(this.gpu), statCpu:Math.round(this.cpu), statLat:Math.round(this.lat),\n      ...selVals\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
